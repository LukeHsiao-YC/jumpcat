<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓咪跳繩大戰爭</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: '微軟正黑體', sans-serif;
            margin: 0; padding: 0; height: 100vh;
            background: #87CEEB;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .header {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .stats { font-size: 14px; font-weight: bold; color: #ffd700; display: flex; flex-direction: column; align-items: center; }
        .stats span { font-size: 22px; }
        
        .timer-container {
            flex-grow: 1;
            margin: 0 20px;
            text-align: center;
        }
        #phase-text { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #fff; text-shadow: 2px 2px 0 #333; }
        .progress-bar {
            width: 100%; height: 16px;
            background: #555; border-radius: 8px; overflow: hidden;
            border: 2px solid #fff;
        }
        #time-bar {
            width: 100%; height: 100%;
            background: #2ed573; transition: width 0.5s linear, background 0.5s;
        }

        #pace-indicator {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 20px;
            border-radius: 20px; font-weight: bold; font-size: 16px; z-index: 25;
            display: none; border: 2px solid #fff; white-space: nowrap;
        }

        #battlefield {
            flex-grow: 1;
            position: relative;
            background-color: #87CEEB;
            background-image: linear-gradient(to bottom, transparent 70%, #8B4513 70%);
            border-bottom: 10px solid #2ed573; 
            overflow: hidden;
            transition: background-color 1s ease, border-bottom-color 1s ease, background-image 1s ease;
        }

        .scenery {
            position: absolute;
            bottom: 30%;
            width: 200%;
            height: 100px;
            background-image: repeating-linear-gradient(90deg, transparent 0, transparent 100px, rgba(255,255,255,0.2) 100px, rgba(255,255,255,0.2) 120px);
            transition: transform 0.2s ease-out;
            z-index: 1;
        }

        #scout-cat {
            position: absolute;
            bottom: 30%;
            left: 20%;
            font-size: 60px;
            z-index: 10;
            transition: transform 0.1s ease-out;
            display: none;
            transform: scaleX(-1) translateY(0); 
        }

        .bg-prop {
            position: absolute;
            z-index: 2;
            transition: transform 0.2s ease-out;
            pointer-events: none;
        }

        .unit {
            position: absolute;
            bottom: 30%;
            font-size: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.1s linear, opacity 0.3s, transform 0.3s;
            z-index: 5;
        }
        .unit.dead { opacity: 0; transform: scale(1.5); pointer-events: none; }
        .hp-bar-bg { width: 40px; height: 6px; background: red; margin-bottom: 5px; border-radius: 3px; }
        .hp-bar { height: 100%; background: #2ed573; border-radius: 3px; width: 100%; transition: width 0.2s; }
        
        .damage-text {
            position: absolute; color: red; font-weight: bold; font-size: 26px;
            text-shadow: 2px 2px 0 #fff;
            animation: floatUp 0.6s ease-out forwards; pointer-events: none; z-index: 30;
        }
        
        .shop {
            background: #222; padding: 10px 5px;
            display: flex; justify-content: center; gap: 6px;
            z-index: 20; position: relative; flex-wrap: wrap;
        }
        #shop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 25; display: flex;
            justify-content: center; align-items: center;
            color: white; font-size: 18px; font-weight: bold;
            pointer-events: none; 
        }
        
        .cat-card {
            background: #fff; border-radius: 10px; padding: 5px;
            text-align: center; width: 82px; border: 3px solid #ccc;
            opacity: 0.5; transition: 0.3s; position: relative;
        }
        .cat-card.charged { opacity: 1; border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .cat-card.affordable { opacity: 1; border-color: #2ed573; cursor: pointer; }
        .cat-card.locked { filter: grayscale(100%); opacity: 0.3; }
        .cat-card.used { filter: grayscale(100%); opacity: 0.3; pointer-events: none; }

        .cat-card .icon { font-size: 24px; }
        .cat-card .price { color: #ff4757; font-weight: bold; font-size: 11px; margin: 2px 0; }
        .cat-card .hint { background: #555; color: white; border-radius: 4px; font-size: 9px; padding: 2px; margin-top: 1px; }
        .cat-card .level-tag { color: #3742fa; font-size: 10px; font-weight: bold; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; justify-content: center;}
        button {
            background: #ff4757; color: white; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-secondary { background: #3742fa; }
        .btn-success { background: #2ed573; }
        .btn-gold { background: #ffa502; }

        #daily-chest-btn, #bonus-chest-3, #bonus-chest-5 {
            background: #ffd700; color: #d35400; font-size: 18px; padding: 12px 24px;
            border-radius: 12px; border: 2px solid #e67e22; font-weight: bold;
            animation: pulse 1.5s infinite; margin: 10px 0; cursor: pointer;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #sys-msg {
            position: absolute; top: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #ffd700; padding: 10px 30px;
            border-radius: 20px; font-size: 20px; font-weight: bold; z-index: 50;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="reward-modal" class="overlay" style="display: none; background: rgba(0,0,0,0.9); z-index: 200;">
        <h1 style="color: #ffd700; font-size: 40px;">開箱成功！</h1>
        <p id="reward-text" style="color: #fff; font-size: 24px;"></p>
        <button id="close-reward-btn" class="btn-success">收下獎勵</button>
    </div>

    <div id="setup-screen" class="overlay">
        <button id="cheat-day-btn" style="position: absolute; top: 15px; left: 15px; font-size: 12px; padding: 8px; background: #555;">模擬換日</button>
        
        <h1>貓咪跳繩大戰爭</h1>
        <div class="streak-badge" id="streak-display">連續跳繩：1 天</div>
        <div style="color: #e67e22; font-weight: bold; margin-bottom: 10px;">勇氣罐頭：<span id="cans-display">0</span> 🥫</div>
        
        <div id="chests-area">
            <button id="daily-chest-btn" style="display: none;">🎁 領取今日寶箱</button>
            <button id="bonus-chest-3" style="display: none;">🥉 完成 3 局獎勵</button>
            <button id="bonus-chest-5" style="display: none;">🥇 完成 5 局獎勵</button>
        </div>

        <div id="mode-selection" class="btn-group">
            <button id="mode-rope-btn" class="btn-gold">有繩挑戰 (獎勵 x2)</button>
            <button id="mode-norope-btn" class="btn-secondary">無繩休閒</button>
        </div>

        <div id="connect-section" style="display: none; flex-direction: column; align-items: center;">
            <p id="connection-status" style="color: #ff4757; font-weight: bold;">請連線 Joy-Con</p>
            <div class="btn-group">
                <button id="connect-btn">連線</button>
                <button id="kb-start-btn" class="btn-secondary">鍵盤開始</button>
                <button id="start-btn" class="btn-success" style="display:none;">開始挑戰</button>
            </div>
            <button id="metronome-toggle-btn" style="background: #34495e; color: white; margin-top: 10px; font-size: 12px;">節拍器：關閉</button>
            <button id="back-mode-btn" style="background: transparent; color: #888; font-size: 12px;">重新選擇</button>
        </div>

        <div style="position: absolute; bottom: 15px; font-size: 14px; color: #888;">
            蕭宇超製作 一起健康生活
        </div>
    </div>

    <div id="result-screen" class="overlay" style="display: none;">
        <h1 id="result-title">成功防守！</h1>
        <p id="growth-feedback" style="color: #2ed573; font-weight: bold;"></p>
        <p>本局跳躍：<span id="result-jumps" style="color:#ff4757;">0</span> 下</p>
        <p>獲得金幣：<span id="result-coins" style="color:#ffd700;">0</span> 🪙</p>
        <p>獲得罐頭：<span id="result-cans" style="color:#e67e22;">0</span> 🥫</p>
        <div class="btn-group">
            <button id="next-round-btn" class="btn-success">繼續挑戰</button>
            <button id="end-training-btn" class="btn-secondary">結束訓練</button>
        </div>
    </div>

    <div class="header">
        <div class="stats">局數<br><span id="round-display">1</span></div>
        <div class="stats">金幣<br><span id="coin-display">0</span></div>
        <div class="timer-container">
            <div id="phase-text">備戰中</div>
            <div class="progress-bar"><div id="time-bar"></div></div>
        </div>
        <div class="stats">次數<br><span id="jump-display">0</span></div>
    </div>

    <div id="pace-indicator">節奏測量中</div>

    <div id="battlefield">
        <div class="scenery" id="scenery"></div>
        <div id="scout-cat">🐈</div>
    </div>
    
    <div id="sys-msg"></div>
    <div id="phase-transition">
        <h2 id="transition-title">怪物來襲！</h2>
    </div>

    <div class="shop" id="shop">
        <div id="shop-overlay">跳躍中...</div>
        <div class="cat-card" id="card-1">
            <div class="icon">🐈</div><div class="level-tag" id="lv-1">Lv.1</div>
            <div class="price">10 🪙</div><div class="hint" id="stats-1"></div>
        </div>
        <div class="cat-card" id="card-2">
            <div class="icon">🛡️</div><div class="level-tag" id="lv-2">Lv.1</div>
            <div class="price">30 🪙</div><div class="hint" id="stats-2"></div>
        </div>
        <div class="cat-card" id="card-3">
            <div class="icon">😼</div><div class="level-tag" id="lv-3">Lv.1</div>
            <div class="price">50 🪙</div><div class="hint" id="stats-3"></div>
        </div>
        <div class="cat-card locked" id="card-4">
            <div class="icon">✨</div><div class="level-tag" id="lv-4">Lv.1</div>
            <div class="price">150 🪙</div><div class="hint" id="stats-4"></div>
        </div>
        <div class="cat-card locked" id="card-5">
            <div class="icon">🤖</div><div class="level-tag" id="lv-5">Lv.1</div>
            <div class="price">300 🪙</div><div class="hint" id="stats-5"></div>
        </div>
        <div class="cat-card locked" id="card-6">
            <div class="icon">🦁</div><div class="level-tag">絕招</div>
            <div class="price">400 🪙</div><div class="hint">全場秒殺</div>
        </div>
    </div>

    <script>
        let storage = {
            consecutiveDays: parseInt(localStorage.getItem('conDays') || '1'),
            lastDate: localStorage.getItem('lastDate') || '',
            lifetimeJumps: parseInt(localStorage.getItem('lifeJumps') || '0'),
            cans: parseInt(localStorage.getItem('cans') || '0'),
            catLevels: JSON.parse(localStorage.getItem('catLvs') || '{"1":1,"2":1,"3":1,"4":1,"5":1}'),
            lastDraw: localStorage.getItem('lastDraw') || '',
            lastBonus3: localStorage.getItem('lastBonus3') || '',
            lastBonus5: localStorage.getItem('lastBonus5') || ''
        };

        function saveGame() {
            localStorage.setItem('conDays', storage.consecutiveDays);
            localStorage.setItem('lastDate', storage.lastDate);
            localStorage.setItem('lifeJumps', storage.lifetimeJumps);
            localStorage.setItem('cans', storage.cans);
            localStorage.setItem('catLvs', JSON.stringify(storage.catLevels));
            localStorage.setItem('lastDraw', storage.lastDraw);
            localStorage.setItem('lastBonus3', storage.lastBonus3);
            localStorage.setItem('lastBonus5', storage.lastBonus5);
            document.getElementById('cans-display').innerText = storage.cans;
        }

        let currentRound = 1;
        let todayCompleted = 0;
        let coins = 0;
        let roundJumps = 0;
        let isPlaying = false;
        let playMode = 'NOROPE';
        let jumpTimestamps = [];
        let audioCtx, metronomeInterval, isMetronomeOn = false;
        let lastJumpTime = 0;
        let lionUsed = false;
        let units = [];
        let timeRemaining = 180;
        let currentPhase = 'NONE';
        let gameLoopId, timerInterval;
        let sceneryPos = 0;

        // 環遊世界主題設定
        const WORLDS = [
            { name: '台灣', sky: '#87CEEB', ground: '#8B4513', border: '#2ed573', prop: ['🌴', '🌳', '☁️', '🧋'] },
            { name: '日本', sky: '#ffb8b8', ground: '#2f3542', border: '#ff9ff3', prop: ['🌸', '⛩️', '☁️', '🗻'] },
            { name: '埃及', sky: '#feca57', ground: '#e1b12c', border: '#d35400', prop: ['🐪', '🏜️', '☀️', '🌵'] },
            { name: '法國', sky: '#a4b0be', ground: '#57606f', border: '#747d8c', prop: ['🥐', '🎨', '☁️', '☕'] },
            { name: '美國', sky: '#70a1ff', ground: '#2f3640', border: '#1e90ff', prop: ['🍔', '🗽', '☁️', '🦅'] }
        ];

        const CAT_BASE = {
            1: { icon: '🐈', price: 10, hp: 50, atk: 15, speed: 2, range: 40, cd: 50 },
            2: { icon: '🛡️', price: 30, hp: 250, atk: 5, speed: 1, range: 40, cd: 80 },
            3: { icon: '😼', price: 50, hp: 40, atk: 40, speed: 4, range: 50, cd: 40 },
            4: { icon: '✨', price: 150, hp: 750, atk: 10, speed: 1, range: 40, cd: 80 },
            5: { icon: '🤖', price: 300, hp: 600, atk: 200, speed: 1.5, range: 60, cd: 120 }
        };

        const MONSTERS = [
            { icon: '👾', baseHp: 80, atk: 10, speed: 1.5, range: 40, cd: 60 },
            { icon: '🦇', baseHp: 40, atk: 15, speed: 3.5, range: 40, cd: 40 },
            { icon: '👹', baseHp: 300, atk: 30, speed: 1, range: 50, cd: 90 }
        ];

        function updateUI() {
            document.getElementById('streak-display').innerText = `連續跳繩：${storage.consecutiveDays} 天`;
            document.getElementById('cans-display').innerText = storage.cans;
            
            for(let id in storage.catLevels) {
                let lv = storage.catLevels[id];
                document.getElementById(`lv-${id}`).innerText = `Lv.${lv}`;
                let hp = Math.floor(CAT_BASE[id].hp * (1 + (lv-1)*0.2));
                let atk = Math.floor(CAT_BASE[id].atk * (1 + (lv-1)*0.2));
                document.getElementById(`stats-${id}`).innerText = `血${hp} 攻${atk}`;
            }

            const today = new Date().toLocaleDateString();
            document.getElementById('daily-chest-btn').style.display = (storage.lastDraw !== today) ? 'block' : 'none';
            document.getElementById('bonus-chest-3').style.display = (todayCompleted >= 3 && storage.lastBonus3 !== today) ? 'block' : 'none';
            document.getElementById('bonus-chest-5').style.display = (todayCompleted >= 5 && storage.lastBonus5 !== today) ? 'block' : 'none';
            
            checkUnlocks();
        }

        function checkUnlocks() {
            if (storage.lifetimeJumps >= 500) document.getElementById('card-4').classList.remove('locked');
            if (currentRound >= 3) document.getElementById('card-5').classList.remove('locked');
            if (todayCompleted >= 5) document.getElementById('card-6').classList.remove('locked');
        }

        function openChest(type) {
            let gold = 0, cans = 0;
            const today = new Date().toLocaleDateString();
            if (type === 'daily') { gold = 100; cans = 10; storage.lastDraw = today; }
            else if (type === 'bonus3') { gold = 300; cans = 50; storage.lastBonus3 = today; }
            else if (type === 'bonus5') { gold = 600; cans = 100; storage.lastBonus5 = today; }
            
            storage.cans += cans;
            coins += gold;
            document.getElementById('reward-text').innerText = `獲得金幣 x${gold}，罐頭 x${cans}！`;
            document.getElementById('reward-modal').style.display = 'flex';
            saveGame(); updateUI();
        }

        document.getElementById('daily-chest-btn').onclick = () => openChest('daily');
        document.getElementById('bonus-chest-3').onclick = () => openChest('bonus3');
        document.getElementById('bonus-chest-5').onclick = () => openChest('bonus5');
        document.getElementById('close-reward-btn').onclick = () => document.getElementById('reward-modal').style.display = 'none';

        class Unit {
            constructor(isCat, id, typeData) {
                this.isCat = isCat;
                let lv = isCat ? storage.catLevels[id] || 1 : 1;
                let mult = 1 + (lv - 1) * 0.2;
                this.hp = Math.floor((typeData.hp || typeData.baseHp) * mult);
                if (!isCat) this.hp *= (1 + (currentRound-1)*0.5); 
                this.maxHp = this.hp;
                this.atk = Math.floor(typeData.atk * mult);
                this.speed = typeData.speed;
                this.range = typeData.range;
                this.cdMax = typeData.cd;
                this.cd = 0;
                this.x = isCat ? 0 : window.innerWidth - 80;
                this.id = Math.random().toString(36).substr(2,9);
                this.el = this.createDOM(typeData.icon);
                document.getElementById('battlefield').appendChild(this.el);
            }
            createDOM(icon) {
                const el = document.createElement('div');
                el.className = 'unit';
                el.innerHTML = `<div class="hp-bar-bg"><div class="hp-bar" id="hp-${this.id}"></div></div>
                                <div class="emoji-icon" style="transform:scaleX(${this.isCat?-1:1})">${icon}</div>`;
                el.style.left = this.x + 'px';
                return el;
            }
            takeDamage(dmg) {
                this.hp -= dmg;
                const hpBar = document.getElementById(`hp-${this.id}`);
                if(hpBar) hpBar.style.width = Math.max(0, (this.hp/this.maxHp)*100) + '%';
                if(this.hp <= 0) {
                    this.el.classList.add('dead');
                    setTimeout(() => this.el.remove(), 300);
                    if(!this.isCat) coins += 5;
                }
            }
            update(enemies) {
                if(this.hp <= 0) return;
                let nearest = null, minDist = Infinity;
                enemies.forEach(e => {
                    let d = this.isCat ? (e.x - this.x) : (this.x - e.x);
                    if(d > 0 && d < minDist) { minDist = d; nearest = e; }
                });
                if(nearest && minDist <= this.range) {
                    if(this.cd <= 0) { nearest.takeDamage(this.atk); this.cd = this.cdMax; }
                } else {
                    this.x += this.isCat ? this.speed : -this.speed;
                    this.el.style.left = this.x + 'px';
                }
                if(this.cd > 0) this.cd--;
            }
        }

        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            isPlaying = true;
            coins = 30; 
            startJumpPhase();
            gameLoop();
        }

        function applyWorldTheme() {
            let world = WORLDS[(currentRound - 1) % WORLDS.length];
            const bf = document.getElementById('battlefield');
            bf.style.backgroundColor = world.sky;
            bf.style.backgroundImage = `linear-gradient(to bottom, transparent 70%, ${world.ground} 70%)`;
            bf.style.borderBottomColor = world.border;
            showSysMsg(`✈️ 抵達新國家：${world.name}！`);
        }

        function startJumpPhase() {
            currentPhase = 'JUMP';
            timeRemaining = 180;
            roundJumps = 0;
            lionUsed = false;
            
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById('phase-text').innerText = `第 ${currentRound} 局：衝刺中 ${m}:${s.toString().padStart(2, '0')}`;
            
            applyWorldTheme();
            
            document.getElementById('shop-overlay').style.display = 'flex';
            document.getElementById('scout-cat').style.display = 'block';
            document.getElementById('pace-indicator').style.display = 'block';
            units.forEach(u => u.el.remove()); units = [];
            document.querySelectorAll('.bg-prop').forEach(el => el.remove());
        }

        function startBattlePhase() {
            currentPhase = 'BATTLE';
            timeRemaining = 60;
            
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById('phase-text').innerText = `怪獸襲擊！ ${m}:${s.toString().padStart(2, '0')}`;
            
            document.getElementById('shop-overlay').style.display = 'none';
            document.getElementById('scout-cat').style.display = 'none';
            document.getElementById('pace-indicator').style.display = 'none';
        }

        function gameLoop() {
            if(!isPlaying) return;
            if(currentPhase === 'BATTLE') {
                let cats = units.filter(u => u.isCat && u.hp > 0);
                let monsters = units.filter(u => !u.isCat && u.hp > 0);
                cats.forEach(c => c.update(monsters));
                monsters.forEach(m => m.update(cats));
                units = units.filter(u => u.hp > 0 || u.el.parentNode);
                if(Math.random() < 0.02) units.push(new Unit(false, 0, MONSTERS[Math.floor(Math.random()*3)]));
            }
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        setInterval(() => {
            if(!isPlaying) return;
            timeRemaining--;
            let m = Math.floor(timeRemaining/60), s = timeRemaining%60;
            let timeStr = `${m}:${s.toString().padStart(2, '0')}`;
            
            document.getElementById('time-bar').style.width = (timeRemaining/ (currentPhase === 'JUMP' ? 180 : 60)) * 100 + '%';
            
            if(currentPhase === 'JUMP') {
                document.getElementById('phase-text').innerText = `第 ${currentRound} 局：衝刺中 ${timeStr}`;
                const bf = document.getElementById('battlefield');
                if (timeRemaining <= 60) {
                    bf.style.backgroundColor = '#2c3e50'; 
                } else if (timeRemaining <= 120) {
                    bf.style.backgroundColor = '#feca57'; 
                } else {
                    let world = WORLDS[(currentRound - 1) % WORLDS.length];
                    bf.style.backgroundColor = world.sky;
                }
            } else {
                document.getElementById('phase-text').innerText = `怪獸襲擊！ ${timeStr}`;
            }
            
            if(timeRemaining <= 0) {
                if(currentPhase === 'JUMP') startBattlePhase();
                else endRound();
            }
        }, 1000);

        function endRound() {
            isPlaying = false;
            todayCompleted++;
            storage.lifetimeJumps += roundJumps;
            let earnedCans = Math.floor(roundJumps / 10);
            storage.cans += earnedCans;
            saveGame();
            
            document.getElementById('result-jumps').innerText = roundJumps;
            document.getElementById('result-coins').innerText = coins;
            document.getElementById('result-cans').innerText = earnedCans;
            document.getElementById('result-screen').style.display = 'flex';
            updateUI();
        }

        function triggerJump() {
            if(!isPlaying || currentPhase !== 'JUMP') return;
            if(Date.now() - lastJumpTime < 400) return;
            lastJumpTime = Date.now();
            roundJumps++;
            coins += (playMode === 'ROPE' ? 2 : 1);
            document.getElementById('jump-display').innerText = roundJumps;
            document.getElementById('coin-display').innerText = coins;
            
            let cat = document.getElementById('scout-cat');
            if (cat) {
                cat.style.transform = 'scaleX(-1) translateY(-30px)';
                setTimeout(() => cat.style.transform = 'scaleX(-1) translateY(0)', 150);
            }

            sceneryPos -= 50;
            document.getElementById('scenery').style.transform = `translateX(${sceneryPos % 200}px)`;
            
            document.querySelectorAll('.bg-prop').forEach(prop => {
                let currentX = parseFloat(prop.dataset.x) || 0;
                let speed = parseFloat(prop.dataset.speed) || 20;
                currentX -= speed;
                prop.dataset.x = currentX;
                prop.style.transform = `translateX(${currentX}px)`;
                if (currentX < -100) prop.remove();
            });

            if (Math.random() < 0.3) {
                let world = WORLDS[(currentRound - 1) % WORLDS.length];
                let prop = document.createElement('div');
                prop.className = 'bg-prop';
                prop.innerText = world.prop[Math.floor(Math.random() * world.prop.length)];
                prop.dataset.x = window.innerWidth;
                prop.style.transform = `translateX(${window.innerWidth}px)`;
                
                if (Math.random() < 0.4) {
                    prop.style.top = (Math.random() * 30 + 5) + '%';
                    prop.style.fontSize = (Math.random() * 30 + 40) + 'px';
                    prop.dataset.speed = 25; 
                    prop.style.opacity = '0.7';
                    prop.style.zIndex = 2;
                } else {
                    prop.style.bottom = '30%';
                    prop.style.fontSize = (Math.random() * 20 + 50) + 'px';
                    prop.dataset.speed = 50; 
                    prop.style.zIndex = 3;
                }
                document.getElementById('battlefield').appendChild(prop);
            }
        }

        window.addEventListener('keydown', e => {
            if(e.code === 'Space') triggerJump();
            if(e.key >= '1' && e.key <= '5') {
                let id = parseInt(e.key);
                if(coins >= CAT_BASE[id].price) {
                    coins -= CAT_BASE[id].price;
                    units.push(new Unit(true, id, CAT_BASE[id]));
                    document.getElementById('coin-display').innerText = coins;
                }
            }
            if(e.key === '6' && todayCompleted >= 5 && coins >= 400 && !lionUsed) {
                lionUsed = true; coins -= 400;
                units.filter(u => !u.isCat).forEach(m => m.takeDamage(9999));
                showSysMsg("獅子王絕招！");
            }
            if(e.code === 'KeyT' && isPlaying) {
                timeRemaining = Math.max(1, timeRemaining - 10);
            }
        });

        document.getElementById('mode-rope-btn').onclick = () => { playMode = 'ROPE'; document.getElementById('connect-section').style.display = 'flex'; };
        document.getElementById('mode-norope-btn').onclick = () => { playMode = 'NOROPE'; document.getElementById('connect-section').style.display = 'flex'; };
        document.getElementById('kb-start-btn').onclick = startGame;
        document.getElementById('next-round-btn').onclick = () => { currentRound++; startGame(); };
        document.getElementById('end-training-btn').onclick = () => location.reload();
        
        updateUI();

        function showSysMsg(t) {
            let m = document.getElementById('sys-msg');
            m.innerText = t; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }
    </script>
</body>
</html>
